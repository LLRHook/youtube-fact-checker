<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos — YouTube Fact Checker</title>
  <meta name="description" content="Browse all fact-checked YouTube videos with accuracy scores and claim breakdowns.">
  <meta property="og:title" content="Recent Fact Checks — YouTube Fact Checker">
  <meta property="og:description" content="Browse all fact-checked YouTube videos with accuracy scores and claim breakdowns.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .page-container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; }
    .nav-links { display: flex; gap: 1rem; }
    .nav-links a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    .nav-links a:hover { text-decoration: underline; }

    .video-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .video-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.2rem; cursor: pointer; transition: border-color 0.2s;
      text-decoration: none; color: var(--text); display: block;
    }
    .video-card:hover { border-color: var(--accent); }

    .video-card img.thumb { width: 100%; border-radius: 8px; margin-bottom: 0.75rem; aspect-ratio: 16/9; object-fit: cover; }

    .video-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.3; }

    .video-card-meta { display: flex; gap: 0.75rem; font-size: 0.8rem; color: var(--text-muted); flex-wrap: wrap; }
    .video-card-meta .channel-link { color: var(--blue); text-decoration: none; }
    .video-card-meta .channel-link:hover { text-decoration: underline; }

    .score-badge {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px;
      font-size: 0.8rem; font-weight: 700;
    }
    .score-green { background: rgba(46,213,115,0.15); color: var(--green); }
    .score-yellow { background: rgba(255,165,2,0.15); color: var(--yellow); }
    .score-red { background: rgba(255,71,87,0.15); color: var(--red); }

    .empty-state { text-align: center; color: var(--text-muted); padding: 3rem; }

    .toolbar {
      display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center;
    }
    .search-input {
      flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.6rem 1rem; color: var(--text); font-size: 0.9rem; outline: none;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent); }
    .sort-select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.6rem 1rem; color: var(--text); font-size: 0.85rem; cursor: pointer; outline: none;
    }
    .sort-select:focus { border-color: var(--accent); }
    .results-count { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <h1>Recent Fact Checks</h1>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/videos">Videos</a>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="search-input" placeholder="Search by title or channel..." oninput="applyFilters()">
      <select class="sort-select" id="sort-select" onchange="applyFilters()">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="score-desc">Highest score</option>
        <option value="score-asc">Lowest score</option>
        <option value="claims-desc">Most claims</option>
      </select>
    </div>

    <div id="results-count" class="results-count"></div>
    <div id="video-grid" class="video-grid"></div>
    <div id="empty" class="empty-state" style="display:none;">No videos checked yet. <a href="/">Check one now!</a></div>

    <footer class="page-footer">
      <p>Results are AI-generated estimates, not definitive verdicts. Always verify important claims yourself.</p>
    </footer>
  </div>

  <script src="/videos.js"></script>
</body>
</html>
