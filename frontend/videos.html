<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos — YouTube Fact Checker</title>
  <meta name="description" content="Browse all fact-checked YouTube videos with accuracy scores and claim breakdowns.">
  <meta property="og:title" content="Recent Fact Checks — YouTube Fact Checker">
  <meta property="og:description" content="Browse all fact-checked YouTube videos with accuracy scores and claim breakdowns.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='8' fill='%23FF0000'/><polygon points='16,12 16,28 28,20' fill='white'/></svg>">
  <meta name="theme-color" content="#0f0f0f">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: light)').matches)document.documentElement.setAttribute('data-theme','light');})()</script>
  <link rel="preconnect" href="https://img.youtube.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="page-container page-container--wide">
    <div class="page-header">
      <h1>Recent Fact Checks</h1>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/videos" aria-current="page">Videos</a>
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">&#9728;</button>
      </div>
    </div>

    <main>
    <div class="toolbar">
      <div class="search-wrapper">
        <input type="text" class="search-input" id="search-input" placeholder="Filter this page by title or channel..." oninput="debouncedApplyFilters();toggleClearBtn()" aria-label="Filter videos on this page">
        <button class="search-clear" id="search-clear" onclick="document.getElementById('search-input').value='';applyFilters();toggleClearBtn();" title="Clear search">&times;</button>
      </div>
      <select class="sort-select" id="sort-select" onchange="applyFilters()" aria-label="Sort videos">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="score-desc">Highest score</option>
        <option value="score-asc">Lowest score</option>
        <option value="claims-desc">Most claims</option>
      </select>
    </div>

    <p class="kbd-hint">Press <kbd>/</kbd> to search</p>
    <div id="results-count" class="results-count" aria-live="polite"></div>
    <div id="videos-skeleton" class="skeleton-loader skel-grid">
      <div class="skel skel-card"></div>
      <div class="skel skel-card"></div>
      <div class="skel skel-card"></div>
      <div class="skel skel-card"></div>
      <div class="skel skel-card"></div>
      <div class="skel skel-card"></div>
    </div>
    <div id="video-grid" class="video-grid"></div>
    <div id="empty" class="empty-state" style="display:none;">No videos checked yet. <a href="/">Check one now!</a></div>
    <div id="pagination" class="pagination"></div>
    </main>

    <footer class="page-footer">
      <p>Results are AI-generated estimates, not definitive verdicts. Always verify important claims yourself.</p>
    </footer>
  </div>

  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:_prefersReducedMotion.matches?'auto':'smooth'})" title="Back to top" aria-label="Back to top">&#9650;</button>
  <script src="/utils.js"></script>
  <script src="/videos.js"></script>
</body>
</html>
