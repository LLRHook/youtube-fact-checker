<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel — YouTube Fact Checker</title>
  <meta name="description" content="See all fact-checked videos and average accuracy scores for this YouTube channel.">
  <meta property="og:title" content="Channel — YouTube Fact Checker">
  <meta property="og:description" content="See all fact-checked videos and average accuracy scores for this YouTube channel.">
  <meta property="og:type" content="profile">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='8' fill='%23FF0000'/><polygon points='16,12 16,28 28,20' fill='white'/></svg>">
  <meta name="theme-color" content="#0f0f0f">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: light)').matches)document.documentElement.setAttribute('data-theme','light');})()</script>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .page-container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .nav-links { display: flex; gap: 1rem; }
    .nav-links a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    .nav-links a:hover { text-decoration: underline; }

    .channel-header { margin-bottom: 1.5rem; }
    .channel-header h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    .channel-stats { display: flex; gap: 1.5rem; color: var(--text-muted); font-size: 0.9rem; }
    .channel-stats .stat-value { color: var(--text); font-weight: 600; }

    .video-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .video-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.2rem; cursor: pointer; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      text-decoration: none; color: var(--text); display: block;
    }
    .video-card:hover { border-color: var(--accent); }
    .video-card img.thumb { width: 100%; border-radius: 8px; margin-bottom: 0.75rem; aspect-ratio: 16/9; object-fit: cover; }
    .video-card h3 {
      font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .video-card-meta { display: flex; gap: 0.75rem; font-size: 0.8rem; color: var(--text-muted); flex-wrap: wrap; }

    .score-badge {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px;
      font-size: 0.8rem; font-weight: 700;
    }
    .score-green { background: rgba(46,213,115,0.15); color: var(--green); }
    .score-yellow { background: rgba(255,165,2,0.15); color: var(--yellow); }
    .score-red { background: rgba(255,71,87,0.15); color: var(--red); }

    .distribution-bar { margin-bottom: 1.5rem; }
    .distribution-segments { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: var(--border); margin-bottom: 0.5rem; }
    .dist-seg { min-width: 4px; transition: width 0.4s ease; }
    .dist-green { background: var(--green); }
    .dist-yellow { background: var(--yellow); }
    .dist-red { background: var(--red); }
    .dist-legend { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--text-muted); flex-wrap: wrap; }
    .dist-legend-item { display: inline-flex; align-items: center; gap: 0.3rem; }
    .dist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .empty-state { text-align: center; color: var(--text-muted); padding: 3rem; }

    .skeleton-loader { animation: fadeIn 0.3s ease; }
    .skel {
      background: var(--surface);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .skel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .skel-heading { height: 1.4rem; width: 40%; margin-bottom: 0.5rem; }
    .skel-stats { height: 0.9rem; width: 25%; margin-bottom: 1.5rem; }
    .skel-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .skel-card { height: 220px; border-radius: 12px; }
    .back-to-top {
      position: fixed; bottom: 2rem; right: 2rem;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); color: white; border: none;
      font-size: 1.2rem; cursor: pointer;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s, transform 0.2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 100;
    }
    .back-to-top.visible { opacity: 1; visibility: visible; }
    .back-to-top:hover { transform: scale(1.1); }

    @media (max-width: 600px) {
      .page-container { padding: 1.5rem 1rem; }
      .channel-header h1 { font-size: 1.2rem; }
      .channel-stats { flex-direction: column; gap: 0.5rem; }
      .back-to-top { bottom: 1rem; right: 1rem; }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/videos">Videos</a>
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9728;</button>
      </div>
    </div>

    <div id="content">
      <div class="skeleton-loader">
        <div class="skel skel-heading"></div>
        <div class="skel skel-stats"></div>
        <div class="skel-grid">
          <div class="skel skel-card"></div>
          <div class="skel skel-card"></div>
          <div class="skel skel-card"></div>
        </div>
      </div>
    </div>

    <footer class="page-footer">
      <p>Results are AI-generated estimates, not definitive verdicts. Always verify important claims yourself.</p>
    </footer>
  </div>

  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">&#9650;</button>
  <script src="/utils.js"></script>
  <script src="/channel.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
  </script>
</body>
</html>
