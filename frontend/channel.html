<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel — YouTube Fact Checker</title>
  <meta name="description" content="See all fact-checked videos and average accuracy scores for this YouTube channel.">
  <meta property="og:title" content="Channel — YouTube Fact Checker">
  <meta property="og:description" content="See all fact-checked videos and average accuracy scores for this YouTube channel.">
  <meta property="og:type" content="profile">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='8' fill='%23FF0000'/><polygon points='16,12 16,28 28,20' fill='white'/></svg>">
  <meta name="theme-color" content="#0f0f0f">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: light)').matches)document.documentElement.setAttribute('data-theme','light');})()</script>
  <link rel="preconnect" href="https://img.youtube.com" crossorigin>
  <link rel="canonical">
  <link rel="stylesheet" href="/styles.css">
  <script>document.querySelector('link[rel=canonical]').href=location.pathname</script>
</head>
<body>
  <noscript><p style="text-align:center;padding:2rem;color:#ccc;">JavaScript is required to use YouTube Fact Checker.</p></noscript>
  <div class="page-container page-container--wide">
    <div class="page-header">
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/videos">Videos</a>
        <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">&#9728;</button>
      </div>
    </div>

    <main id="content" aria-live="polite">
      <div class="skeleton-loader">
        <div class="skel skel-heading"></div>
        <div class="skel skel-stats"></div>
        <div class="skel-grid">
          <div class="skel skel-card"></div>
          <div class="skel skel-card"></div>
          <div class="skel skel-card"></div>
        </div>
      </div>
    </main>

    <footer class="page-footer">
      <p>Results are AI-generated estimates, not definitive verdicts. Always verify important claims yourself.</p>
    </footer>
  </div>

  <button class="back-to-top" id="back-to-top" title="Back to top" aria-label="Back to top">&#9650;</button>
  <script src="/utils.js"></script>
  <script src="/channel.js"></script>
</body>
</html>
