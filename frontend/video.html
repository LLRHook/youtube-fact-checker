<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video — YouTube Fact Checker</title>
  <meta name="description" content="AI-powered fact-check with accuracy scores and sourced evidence for every claim.">
  <meta property="og:title" content="Video Fact Check — YouTube Fact Checker">
  <meta property="og:description" content="AI-powered fact-check with accuracy scores and sourced evidence for every claim.">
  <meta property="og:image" content="">
  <meta property="og:type" content="article">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='8' fill='%23FF0000'/><polygon points='16,12 16,28 28,20' fill='white'/></svg>">
  <meta name="theme-color" content="#0f0f0f">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: light)').matches)document.documentElement.setAttribute('data-theme','light');})()</script>
  <link rel="preconnect" href="https://www.youtube-nocookie.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .video-embed {
      position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 1.5rem;
      border-radius: 12px; overflow: hidden; background: #000;
    }
    .video-embed iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
    }

    .score-section {
      display: flex; align-items: center; gap: 1.5rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .score-ring { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
    .score-ring svg { width: 100%; height: 100%; }
    .score-ring svg circle:last-child { transition: stroke-dashoffset 0.8s ease; }
    .score-text {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    }
    .score-value { font-size: 1.8rem; font-weight: 700; }
    .score-pct { font-size: 0.9rem; color: var(--text-muted); }
    .score-label h3 { font-size: 1rem; margin-bottom: 0.3rem; }
    .score-label p { color: var(--text-muted); font-size: 0.9rem; }

    .share-btn {
      background: var(--surface); color: var(--text-muted); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.85rem; cursor: pointer;
      margin-bottom: 1.5rem;
    }
    .share-btn:hover { border-color: var(--accent); color: var(--text); }

    #claims-container { display: flex; flex-direction: column; gap: 0.75rem; }

    .skel-video { width: 100%; padding-bottom: 56.25%; border-radius: 12px; margin-bottom: 1.5rem; }
    .skel-title { height: 1.4rem; width: 75%; margin-bottom: 0.5rem; }
    .skel-meta { height: 0.9rem; width: 40%; margin-bottom: 1.5rem; }
    .skel-score-row { display: flex; gap: 1.5rem; align-items: center; margin-bottom: 1.5rem; padding: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .skel-ring { width: 100px; height: 100px; border-radius: 50%; flex-shrink: 0; }
    .skel-score-lines { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .skel-line { height: 1rem; width: 60%; }
    .skel-line-short { height: 0.8rem; width: 90%; }
    .skel-bar { height: 6px; width: 100%; margin-bottom: 1.5rem; border-radius: 3px; }
    .skel-claim { height: 5rem; width: 100%; margin-bottom: 0.75rem; border-radius: 10px; }

    @media (max-width: 600px) {
      .score-section { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="page-container page-container--narrow">
    <div class="page-header">
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/videos">Videos</a>
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9728;</button>
      </div>
    </div>

    <div id="content">
      <div class="skeleton-loader">
        <div class="skel skel-video"></div>
        <div class="skel skel-title"></div>
        <div class="skel skel-meta"></div>
        <div class="skel-score-row">
          <div class="skel skel-ring"></div>
          <div class="skel-score-lines">
            <div class="skel skel-line"></div>
            <div class="skel skel-line-short"></div>
          </div>
        </div>
        <div class="skel skel-bar"></div>
        <div class="skel skel-claim"></div>
        <div class="skel skel-claim"></div>
        <div class="skel skel-claim"></div>
      </div>
    </div>

    <footer class="page-footer">
      <p>Results are AI-generated estimates, not definitive verdicts. Always verify important claims yourself.</p>
    </footer>
  </div>

  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top" aria-label="Back to top">&#9650;</button>
  <script src="/utils.js"></script>
  <script src="/video.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
  </script>
</body>
</html>
