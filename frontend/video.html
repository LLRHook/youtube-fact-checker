<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video — YouTube Fact Checker</title>
  <meta name="description" content="AI-powered fact-check with accuracy scores and sourced evidence for every claim.">
  <meta property="og:title" content="Video Fact Check — YouTube Fact Checker">
  <meta property="og:description" content="AI-powered fact-check with accuracy scores and sourced evidence for every claim.">
  <meta property="og:type" content="article">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='8' fill='%23FF0000'/><polygon points='16,12 16,28 28,20' fill='white'/></svg>">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .page-container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .nav-links { display: flex; gap: 1rem; }
    .nav-links a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    .nav-links a:hover { text-decoration: underline; }

    .video-embed {
      position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 1.5rem;
      border-radius: 12px; overflow: hidden; background: #000;
    }
    .video-embed iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
    }

    .video-info { margin-bottom: 1.5rem; }
    .video-info h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
    .video-meta { display: flex; gap: 1rem; color: var(--text-muted); font-size: 0.85rem; flex-wrap: wrap; }
    .video-meta a { color: var(--blue); text-decoration: none; }
    .video-meta a:hover { text-decoration: underline; }

    .score-section {
      display: flex; align-items: center; gap: 1.5rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .score-ring { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
    .score-ring svg { width: 100%; height: 100%; }
    .score-text {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    }
    .score-value { font-size: 1.8rem; font-weight: 700; }
    .score-pct { font-size: 0.9rem; color: var(--text-muted); }
    .score-label h3 { font-size: 1rem; margin-bottom: 0.3rem; }
    .score-label p { color: var(--text-muted); font-size: 0.9rem; }

    .share-btn {
      background: var(--surface); color: var(--text-muted); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.85rem; cursor: pointer;
      margin-bottom: 1.5rem;
    }
    .share-btn:hover { border-color: var(--accent); color: var(--text); }

    .breakdown-bar-container { margin-bottom: 1rem; }
    .breakdown-segments { display: flex; height: 6px; border-radius: 3px; overflow: hidden; background: var(--border); margin-bottom: 0.5rem; }
    .breakdown-seg { min-width: 4px; transition: width 0.4s ease; }
    .seg-green { background: var(--green); }
    .seg-yellow { background: var(--yellow); }
    .seg-red { background: var(--red); }
    .seg-gray { background: var(--text-muted); }
    .breakdown-legend { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--text-muted); }
    .legend-item { display: inline-flex; align-items: center; gap: 0.3rem; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); }
    .dot-yellow { background: var(--yellow); }
    .dot-red { background: var(--red); }
    .dot-gray { background: var(--text-muted); }

    .claims-heading { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; }

    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn {
      background: var(--surface); color: var(--text-muted); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.4rem 1rem; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .claim-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.2rem; margin-bottom: 0.75rem; transition: border-color 0.2s;
      border-left: 3px solid var(--border);
    }
    .claim-card.border-green { border-left-color: var(--green); }
    .claim-card.border-yellow { border-left-color: var(--yellow); }
    .claim-card.border-red { border-left-color: var(--red); }
    .claim-card.border-gray { border-left-color: var(--text-muted); }
    .claim-card:hover { border-color: var(--accent); }

    .claim-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.5rem; }
    .claim-text { font-size: 0.95rem; flex: 1; }
    .claim-badge {
      display: inline-flex; padding: 0.25rem 0.7rem; border-radius: 20px;
      font-size: 0.8rem; font-weight: 600; white-space: nowrap; flex-shrink: 0;
    }
    .badge-green { background: rgba(46,213,115,0.15); color: var(--green); }
    .badge-yellow { background: rgba(255,165,2,0.15); color: var(--yellow); }
    .badge-red { background: rgba(255,71,87,0.15); color: var(--red); }
    .badge-gray { background: rgba(136,136,170,0.15); color: var(--text-muted); }

    .claim-meta { display: flex; gap: 0.75rem; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .claim-meta a { color: var(--blue); text-decoration: none; }
    .claim-meta a:hover { text-decoration: underline; }

    .claim-reasoning {
      font-size: 0.85rem; color: var(--text-muted); line-height: 1.5;
      margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border);
      display: none;
    }
    .claim-card.expanded .claim-reasoning { display: block; }
    .claim-sources { margin-top: 0.5rem; display: none; }
    .claim-card.expanded .claim-sources { display: block; }

    .source-link {
      display: block; font-size: 0.8rem; color: var(--blue); text-decoration: none;
      margin-bottom: 0.2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .source-link:hover { text-decoration: underline; }

    .source-snippet {
      font-size: 0.78rem; color: var(--text-muted); line-height: 1.4;
      margin: 0.15rem 0 0.5rem; padding-left: 0.5rem; border-left: 2px solid var(--border);
    }

    .claim-toggle {
      background: none; border: none; color: var(--text-muted); font-size: 0.8rem;
      cursor: pointer; padding: 0.3rem 0;
    }
    .claim-toggle:hover { color: var(--text); }

    .category-tag {
      font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 4px;
      background: var(--surface-2); color: var(--text-muted); text-transform: uppercase;
    }

    .empty-state { text-align: center; color: var(--text-muted); padding: 3rem; }

    .skeleton-loader { animation: fadeIn 0.3s ease; }
    .skel {
      background: var(--surface);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .skel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .skel-video { width: 100%; padding-bottom: 56.25%; border-radius: 12px; margin-bottom: 1.5rem; }
    .skel-title { height: 1.4rem; width: 75%; margin-bottom: 0.5rem; }
    .skel-meta { height: 0.9rem; width: 40%; margin-bottom: 1.5rem; }
    .skel-score-row { display: flex; gap: 1.5rem; align-items: center; margin-bottom: 1.5rem; padding: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .skel-ring { width: 100px; height: 100px; border-radius: 50%; flex-shrink: 0; }
    .skel-score-lines { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .skel-line { height: 1rem; width: 60%; }
    .skel-line-short { height: 0.8rem; width: 90%; }
    .skel-bar { height: 6px; width: 100%; margin-bottom: 1.5rem; border-radius: 3px; }
    .skel-claim { height: 5rem; width: 100%; margin-bottom: 0.75rem; border-radius: 10px; }

    .back-to-top {
      position: fixed; bottom: 2rem; right: 2rem;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); color: white; border: none;
      font-size: 1.2rem; cursor: pointer;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s, transform 0.2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 100;
    }
    .back-to-top.visible { opacity: 1; visibility: visible; }
    .back-to-top:hover { transform: scale(1.1); }

    @media (max-width: 600px) {
      .score-section { flex-direction: column; text-align: center; }
      .claim-header { flex-direction: column; }
      .back-to-top { bottom: 1rem; right: 1rem; }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/videos">Videos</a>
      </div>
    </div>

    <div id="content">
      <div class="skeleton-loader">
        <div class="skel skel-video"></div>
        <div class="skel skel-title"></div>
        <div class="skel skel-meta"></div>
        <div class="skel-score-row">
          <div class="skel skel-ring"></div>
          <div class="skel-score-lines">
            <div class="skel skel-line"></div>
            <div class="skel skel-line-short"></div>
          </div>
        </div>
        <div class="skel skel-bar"></div>
        <div class="skel skel-claim"></div>
        <div class="skel skel-claim"></div>
        <div class="skel skel-claim"></div>
      </div>
    </div>

    <footer class="page-footer">
      <p>Results are AI-generated estimates, not definitive verdicts. Always verify important claims yourself.</p>
    </footer>
  </div>

  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">&#9650;</button>
  <script src="/video.js"></script>
  <script>
    window.addEventListener('scroll', () => {
      document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
  </script>
</body>
</html>
